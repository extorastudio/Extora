# Extora — Docker Compose (Full Stack)
# Start: docker compose -f docker/docker-compose.full.yml up -d
# Stop:  docker compose -f docker/docker-compose.full.yml down
# Website: http://localhost         (published site)
# Admin:    http://localhost/admin-panel  (Studio management)
# API:      http://localhost/api/v1/system/health

services:
  postgres:
    image: postgres:16-alpine
    container_name: extora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: extora
      POSTGRES_PASSWORD: ${DB_PASSWORD:-extora}
      POSTGRES_DB: extora
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extora -d extora"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: extora-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: extora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: extora-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Admin123!
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }

  mailhog:
    image: mailhog/mailhog:latest
    container_name: extora-mailhog
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    image: extora-core:local
    container_name: extora-core
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - published_data:/app/apps/core/published
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://extora:${DB_PASSWORD:-extora}@postgres:5432/extora
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production-please}
      PORT: 3000
      LOG_LEVEL: info
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: extora
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      OPENSEARCH_URL: http://opensearch:9200
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      EMAIL_FROM: noreply@extora.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/v1/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.studio
    image: extora-nginx:local
    container_name: extora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - published_data:/usr/share/nginx/published
    depends_on:
      core:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
  osdata:
  published_data:
