# Extora Nginx — Published Site + Studio Admin + API Proxy

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;

        # Studio Admin Panel
        location /admin-panel {
            alias /usr/share/nginx/studio;
            try_files $uri $uri/ /admin-panel/index.html;
        }

        # Studio assets (Vite builds absolute paths to /assets/)
        location /assets/ {
            alias /usr/share/nginx/studio/assets/;
        }

        # API proxy to Core
        location /api/ {
            proxy_pass http://core:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy
        location /api/v1/ws {
            proxy_pass http://core:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Published Site (root)
        location / {
            root /usr/share/nginx/published;
            index index.html;
            try_files $uri $uri/ $uri.html /index.html;
        }

        # MinIO Console
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # MailHog
        location /mail/ {
            proxy_pass http://mailhog:8025/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
