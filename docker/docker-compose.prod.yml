version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: extora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - studio_dist:/usr/share/nginx/html:ro
    depends_on:
      core:
        condition: service_healthy
    networks:
      - extora

  core:
    image: extora-core:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.core
    container_name: extora-core
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://extora:${DB_PASSWORD}@postgres:5432/extora
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3000
      LOG_LEVEL: info
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: extora
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - extora

  postgres:
    image: postgres:16-alpine
    container_name: extora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: extora
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: extora
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extora -d extora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extora

  redis:
    image: redis:7-alpine
    container_name: extora-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extora

  minio:
    image: minio/minio:latest
    container_name: extora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extora

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: extora-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD}
      plugins.security.disabled: "true"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - extora

volumes:
  pgdata:
  redisdata:
  miniodata:
  osdata:
  studio_dist:

networks:
  extora:
    driver: bridge
