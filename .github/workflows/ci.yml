name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: extora
          POSTGRES_PASSWORD: extora
          POSTGRES_DB: extora_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U extora -d extora_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://extora:extora@localhost:5432/extora_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-not-for-production
          ENCRYPTION_KEY: ci-test-encryption-key-not-for-prod
          NODE_ENV: test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: extora
          POSTGRES_PASSWORD: extora
          POSTGRES_DB: extora_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U extora -d extora_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @extora/core db:generate
        env:
          DATABASE_URL: postgresql://extora:extora@localhost:5432/extora_test

      - name: Run migrations
        run: pnpm --filter @extora/core db:migrate
        env:
          DATABASE_URL: postgresql://extora:extora@localhost:5432/extora_test

      - name: Run tests
        run: pnpm --filter @extora/core test -- --coverage
        env:
          DATABASE_URL: postgresql://extora:extora@localhost:5432/extora_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-not-for-production
          ENCRYPTION_KEY: ci-test-encryption-key-not-for-prod
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
