name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/extora-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/extora-core:${{ github.ref_name }}

  npm-publish:
    name: Publish npm Packages
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Publish @extora/types
        run: cd packages/types && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @extora/sdk
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @extora/cli
        run: cd apps/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, npm-publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Extora ${{ github.ref_name }}"
          body: |
            ## Extora v${{ github.ref_name }}

            ### Installation
            ```bash
            # Docker
            docker pull extorastudio/extora-core:${{ github.ref_name }}

            # npm
            npm install -g @extora/cli

            # pnpm
            pnpm add @extora/sdk @extora/types
            ```

            ### Quick Start
            ```bash
            extora create plugin my-plugin
            extora dev
            ```
          draft: false
          prerelease: false
