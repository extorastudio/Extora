name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/extora-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/extora-core:${{ github.ref_name }}

  release:
    name: Build & Create Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Studio
        run: cd apps/studio && npx vite build

      - name: Build Core
        env:
          DATABASE_URL: postgresql://nodb:5432/nodb
        run: cd apps/core && npx prisma generate && npx tsc

      - name: Package for platforms
        run: bash scripts/package-platforms.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Extora Studio ${{ github.ref_name }}"
          body: |
            ## Extora Studio ${{ github.ref_name }}

            All-in-one package — unpack and run.

            ### 📦 Downloads

            | Platform | Download |
            |---|---|
            | 🐧 Linux | `extora-${{ github.ref_name }}-linux-x64.tar.gz` |
            | 🍎 macOS Intel | `extora-${{ github.ref_name }}-darwin-x64.tar.gz` |
            | 🍎 macOS M1/M2 | `extora-${{ github.ref_name }}-darwin-arm64.tar.gz` |
            | 🪟 Windows | `extora-${{ github.ref_name }}-win-x64.zip` |
            | 🐳 Docker | `{user}/extora-core:${{ github.ref_name }}` |

            ### 🚀 Quick Start
            ```bash
            # 1. Download & Extract
            tar -xzf extora-${{ github.ref_name }}-linux-x64.tar.gz
            cd extora-${{ github.ref_name }}

            # 2. Start (requires Docker)
            ./start.sh

            # 3. Open http://localhost in browser
            ```

            ### 📦 Includes
            - Nginx reverse proxy
            - Extora Core Runtime
            - PostgreSQL 16, Redis 7, MinIO, OpenSearch
            - Extora Studio (Admin UI)
            - 6 pre-installed plugins (Auth, CMS, Commerce, Forms, SEO, Analytics)

            ### ⚙️ Requirements
            - Docker Desktop installed
            - 4GB+ RAM available
          draft: false
          prerelease: false
          files: |
            dist/releases/extora-*-linux-x64.tar.gz
            dist/releases/extora-*-darwin-x64.tar.gz
            dist/releases/extora-*-darwin-arm64.tar.gz
            dist/releases/extora-*-win-x64.zip
